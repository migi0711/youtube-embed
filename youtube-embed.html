<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; frame-src https://www.youtube.com; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<style>*{margin:0;padding:0}body{background:#000;overflow:hidden}iframe{width:100vw;height:100vh;border:none}</style>
</head>
<body>
<iframe id="player" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
<script>
const params = new URLSearchParams(location.search);
const v = params.get('v');
if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) {
    document.getElementById('player').src = 'https://www.youtube.com/embed/' + v;
}
</script>
</body>
</html>
